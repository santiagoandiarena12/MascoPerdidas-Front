<div class="home-wrapper">
  <!-- Mapa -->
  <div class="mapa-container">
    <h1 class="mapa-titulo">Mapa de Reportes</h1>
    <div #mapaMascotas class="mapa"></div>
  </div>

  <!-- Boton flotante de filtros -->
  <button class="btn-filtros-flotante" (click)="toggleDrawer()" aria-label="Abrir filtros">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
    </svg>
    Filtros
  </button>

  <!-- Overlay -->
  @if (drawerAbierto()) {
    <div class="drawer-overlay" (click)="toggleDrawer()"></div>
  }

  <!-- Drawer -->
  <aside class="drawer" [class.drawer--abierto]="drawerAbierto()">
    <div class="drawer-header">
      <button class="drawer-cerrar" (click)="toggleDrawer()" aria-label="Cerrar filtros">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <app-filtros (filtrosAplicados)="onFiltrosAplicados($event)" />
  </aside>
</div>
